name: Build APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'APK/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'APK/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 固定使用 1.5.0 版本以避开最新的参数兼容性 Bug
        pip install "buildozer==1.5.0" "cython<3.0.0"

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          libffi-dev \
          libssl-dev \
          python3-dev \
          zip \
          unzip \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          cmake \
          libltdl-dev \
          lld

    - name: Build APK
      run: |
        cd APK
        # 1. 彻底清理之前的错误缓存
        buildozer android clean
        
        # 2. 预先接受所有 SDK 许可
        mkdir -p "$HOME/.android"
        touch "$HOME/.android/repositories.cfg"
        yes | buildozer android debug
      env:
        # 清除系统预装路径干扰
        ANDROID_HOME: ""
        ANDROID_NDK_HOME: ""

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: cabin-alt-apk
        path: APK/bin/*.apk
        retention-days: 30