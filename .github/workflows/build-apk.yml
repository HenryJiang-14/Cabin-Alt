name: Build APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'APK/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'APK/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: false
        default: '1.0.0'

jobs:
  build:
    # 核心修改 1：将系统降级到 22.04，这是目前 Kivy 打包最稳的环境
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 核心修改 2：锁定 Cython 版本，避免 3.x 带来的编译冲突
        pip install "cython<3.0.0" buildozer

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          openjdk-17-jdk \
          build-essential \
          git \
          libffi-dev \
          libssl-dev \
          python3-dev \
          zip \
          unzip \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          cmake \
          libltdl-dev \
          lld

    - name: Build APK
      # 核心修改 3：移除手动安装 SDK 的步骤，让 Buildozer 自己管理
      # 这样可以避免 GitHub 预装的 SDK 与 Buildozer 下载的产生冲突
      run: |
        cd APK
        # 自动接受所有 SDK 许可
        yes | buildozer android debug
      env:
        # 强制清理可能干扰 Buildozer 的系统环境变量
        ANDROID_HOME: ""
        ANDROID_NDK_HOME: ""

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: cabin-alt-apk
        path: APK/bin/*.apk
        retention-days: 30